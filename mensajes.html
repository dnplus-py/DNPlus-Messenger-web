    <style>
        /* Ajuste manual para asegurar que los iconos no se muevan */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 62px;
            background-color: #085f56;
            padding: 0 15px;
            color: white;
            position: relative;
            z-index: 1000;
        }
        
        /* Contenedor de iconos derecha */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Corrección del overlay de grabación */
        #rec-overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #111b21;
            display: none; /* Se activa con flex */
            align-items: center;
            padding: 0 20px;
            z-index: 50;
            border-radius: 25px;
        }
    </style>
