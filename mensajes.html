<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNpPlus Messenger</title>
    
    <link rel="stylesheet" href="https://dnplus-py.github.io/DNPlus-Messenger-web/mensajes.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        header {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important; /* Empezamos desde la izquierda */
            padding: 0 10px !important;
        }

        /* Este contenedor tiene el nombre y la foto */
        .info-contacto {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ESTE ES EL TRUCO: Empuja todo lo que sigue a la derecha */
        .iconos-derecha {
            margin-left: auto !important; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header-menu {
            right: 5px !important; /* Para que el menú no se salga de la pantalla */
            top: 50px !important;
            z-index: 9999 !important;
        }
    </style>
</head>
<body>

    <div id="action-header-menu">
        <i class="fas fa-reply text-xl cursor-pointer" onclick="alert('Respondiendo...')"></i>
        <i class="fas fa-share text-xl cursor-pointer" onclick="alert('Reenviando...')"></i>
        <i class="fas fa-trash text-xl cursor-pointer" onclick="borrarMensaje()"></i>
        <i class="fas fa-times text-xl cursor-pointer ml-4" onclick="cerrarMenuAcciones()"></i>
    </div>

    <header>
        <div class="info-contacto">
            <i class="fas fa-arrow-left p-2 cursor-pointer" onclick="history.back()"></i>
            <img id="header-photo" src="" class="w-10 h-10 rounded-full object-cover">
            <div>
                <div id="header-name" class="font-bold text-sm">Cargando...</div>
                <div class="text-[10px] text-green-400">en línea</div>
            </div>
        </div>

        <div class="iconos-derecha">
            <i class="fas fa-phone p-2 cursor-pointer" onclick="irALlamada()"></i>
            <div class="relative">
                <i class="fas fa-ellipsis-v p-2 cursor-pointer" onclick="toggleHeaderMenu()"></i>
                
                <div id="header-menu" class="msg-menu" style="display: none; position: absolute; background: #232d36; border-radius: 8px; width: 180px;">
                    <div class="menu-item" style="padding: 12px; color: white; cursor: pointer;" onclick="cambiarFondo()">
                        <i class="fas fa-image mr-2"></i> Fondo de pantalla
                    </div>
                    <div class="menu-item" style="padding: 12px; color: white; cursor: pointer;" onclick="vaciarChat()">
                        <i class="fas fa-broom mr-2"></i> Vaciar chat
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-container"></main>

    <script>
        function irALlamada() {
            const destino = typeof idReceptor !== 'undefined' ? idReceptor : '';
            window.location.href = "llamada.html?id=" + destino;
        }
    </script>
    <script src="https://dnplus-py.github.io/DNPlus-Messenger-web/mensajes.js"></script>

</body>
</html>
